[advisories]
yanked = "warn"

[licenses]
allow = [
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "ISC",
    "MIT",
    "MPL-2.0",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
]
confidence-threshold = 0.8
# TODO: Revisit the BSL-1.0 allowance if rustyline's clipboard dependency changes.
# TODO: Revisit the Unicode-3.0 allowance if the ICU dependency tree changes.
# TODO: Keep crate-specific license exceptions here if future dependencies need them.
exceptions = []

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
