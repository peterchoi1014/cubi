name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

permissions:
  contents: read

jobs:
  check:
    name: build · test · clippy · fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (stable, with clippy and rustfmt)
        run: |
          rustup toolchain install stable --profile minimal --component clippy --component rustfmt
          rustup default stable

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo build
        run: cargo build --all-targets --locked

      - name: smoke-test --version / --help / unknown flag
        run: |
          set -e
          BIN=target/debug/cubi

          # --version: must start with "cubi " followed by the Cargo
          # version. We use grep -F so pre-release/build metadata (e.g.
          # "0.3.0-alpha.1+build7") flows through unmodified.
          pkg_ver="$(cargo pkgid --offline | awk -F'[#@]' '{print $NF}')"
          out="$("$BIN" --version)"
          echo "$out"
          echo "$out" | grep -Fxq "cubi $pkg_ver" \
            || { echo "expected: cubi $pkg_ver"; exit 1; }

          "$BIN" --help | grep -q "USAGE:" || { echo "--help missing USAGE section"; exit 1; }

          # Unknown flag must exit with status 2 specifically — not just
          # any non-zero — so we don't silently regress to e.g. 1.
          set +e
          "$BIN" --definitely-not-a-flag
          status=$?
          set -e
          if [ "$status" -ne 2 ]; then
            echo "unknown flag should exit 2, got $status"; exit 1
          fi

          # completions: each supported shell must exit 0 and emit a
          # non-empty script containing the binary name. An unknown shell
          # must exit with status 2.
          for shell in bash zsh fish; do
            out="$("$BIN" completions "$shell")"
            if [ -z "$out" ]; then
              echo "completions $shell produced empty output"; exit 1
            fi
            echo "$out" | grep -q "cubi" \
              || { echo "completions $shell missing 'cubi' reference"; exit 1; }
          done
          set +e
          "$BIN" completions tcsh
          status=$?
          set -e
          if [ "$status" -ne 2 ]; then
            echo "unknown shell should exit 2, got $status"; exit 1
          fi

      - name: cargo test
        run: cargo test --all-targets --locked

      - name: cargo clippy
        run: cargo clippy --all-targets --locked -- -D warnings
