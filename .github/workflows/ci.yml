name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

permissions:
  contents: read

jobs:
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (1.85, with rustfmt)
        uses: dtolnay/rust-toolchain@1.85
        with:
          components: rustfmt

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (1.85, with clippy)
        uses: dtolnay/rust-toolchain@1.85
        with:
          components: clippy

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-clippy-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-clippy-
            ${{ runner.os }}-cargo-

      - name: cargo clippy
        run: cargo clippy --all-targets --locked -- -D warnings

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (1.85)
        uses: dtolnay/rust-toolchain@1.85

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-
            ${{ runner.os }}-cargo-

      - name: cargo build
        run: cargo build --all-targets --locked

      - name: smoke-test --version / --help / unknown flag
        shell: pwsh
        run: |
          $PSNativeCommandUseErrorActionPreference = $false
          $bin = if ($IsWindows) { "target/debug/cubi.exe" } else { "target/debug/cubi" }
          $pkgVer = (cargo pkgid --offline) -replace '^.*[#@]', ''

          $out = & $bin --version
          Write-Output $out
          if ($out -ne "cubi $pkgVer") {
            Write-Error "expected: cubi $pkgVer"
            exit 1
          }

          $help = & $bin --help
          if (($help -join "`n") -notmatch "USAGE:") {
            Write-Error "--help missing USAGE section"
            exit 1
          }

          $plugins = & $bin plugins list
          Write-Output $plugins
          if ($LASTEXITCODE -ne 0) {
            Write-Error "plugins list should exit 0"
            exit 1
          }

          & $bin --definitely-not-a-flag
          if ($LASTEXITCODE -ne 2) {
            Write-Error "unknown flag should exit 2, got $LASTEXITCODE"
            exit 1
          }
          exit 0

      - name: smoke-test completions
        if: runner.os != 'Windows'
        run: |
          set -e
          BIN=target/debug/cubi

          # completions: each supported shell must exit 0 and emit a
          # non-empty script containing the binary name. An unknown shell
          # must exit with status 2.
          for shell in bash zsh fish; do
            out="$($BIN completions "$shell")"
            if [ -z "$out" ]; then
              echo "completions $shell produced empty output"; exit 1
            fi
            echo "$out" | grep -q "cubi"               || { echo "completions $shell missing 'cubi' reference"; exit 1; }
          done
          set +e
          "$BIN" completions tcsh
          status=$?
          set -e
          if [ "$status" -ne 2 ]; then
            echo "unknown shell should exit 2, got $status"; exit 1
          fi

      - name: cargo test
        run: cargo test --all-targets --locked
