name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

permissions:
  contents: read

jobs:
  check:
    name: build · test · clippy · fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (stable, with clippy and rustfmt)
        run: |
          rustup toolchain install stable --profile minimal --component clippy --component rustfmt
          rustup default stable

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo build
        run: cargo build --all-targets --locked

      - name: cargo test
        run: cargo test --all-targets --locked

      - name: cargo clippy
        run: cargo clippy --all-targets --locked -- -D warnings

      - name: smoke-test --version / --help / unknown flag
        run: |
          set -e
          cargo build --locked --bin cubi
          BIN=target/debug/cubi

          out="$("$BIN" --version)"
          echo "$out"
          [[ "$out" =~ ^cubi\ [0-9]+\.[0-9]+\.[0-9]+ ]] || { echo "--version output unexpected"; exit 1; }

          "$BIN" --help | grep -q "USAGE:" || { echo "--help missing USAGE section"; exit 1; }

          # Unknown flag must exit non-zero (2) without hanging in the REPL.
          if "$BIN" --definitely-not-a-flag; then
            echo "unknown flag should have failed"; exit 1
          fi
