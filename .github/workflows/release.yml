name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add ${{ matrix.target }}

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-
            ${{ runner.os }}-cargo-

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }} --bin cubi

      - name: Package release assets
        run: |
          set -euo pipefail
          mkdir -p dist/${{ matrix.target }}
          cp target/${{ matrix.target }}/release/cubi dist/${{ matrix.target }}/cubi
          cp target/${{ matrix.target }}/release/cubi dist/cubi-${{ matrix.target }}
          tar -C dist/${{ matrix.target }} -czf dist/cubi-${{ matrix.target }}.tar.gz cubi

      - name: Upload GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/cubi-${{ matrix.target }}
            dist/cubi-${{ matrix.target }}.tar.gz
